<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - ChatRandom</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 800px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1 {
    color: #333;
}

p {
    color: #555;
    line-height: 1.6;
}

.contact-box {
    margin-top: 20px;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
}

.email {
    font-weight: bold;
    color: #007bff;
}
</style>
</head>

<body>

<div class="container">
    <h1>Contact Us</h1>

    <p>
        If you have any questions, feedback, or issues while using ChatRandom,
        feel free to contact us.
    </p>

    <div class="contact-box">
        <p>Email us at:</p>
        <p class="email">devsritraders@gmail.com</p>
    </div>

    <p>
        We try to respond as quickly as possible.
    </p>
</div>

</body>
</html>
