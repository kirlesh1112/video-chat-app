<!-- ENTRY SCREEN -->
<div id="entry-screen" class="screen active">
    <div class="container">
        <h1>🎥 ChatRandom</h1>

        <input id="name" placeholder="Name"><br><br>

        <select id="gender">
            <option value="">Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select><br><br>

        <select id="language">
            <option value="">Language</option>
            <option>Telugu</option>
            <option>Hindi</option>
            <option>English</option>
        </select><br><br>

        <button id="startBtn">Start Chatting</button>

        <div style="margin-top:20px; color:white; font-size:14px; text-align:center;">
            <p><b>Community Guidelines</b></p>
            <p>• Be respectful</p>
            <p>• No abuse</p>

<!-- WAITING -->
<div id="waiting-screen" class="screen">
    <h2 style="text-align:center;margin-top:200px;">Finding partner...</h2>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen">
    <div class="main-layout">

        <div class="video-section">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <span>You</span>
            </div>

            <div class="video-box">
                <video id="partnerVideo" autoplay playsinline></video>
                <span id="partnerName">Connecting...</span>
            </div>
        </div>

        <div class="chat-container">
            <div id="chatMessages"></div>

            <div>
                <input id="chatInput" placeholder="Type message..." />
                <button id="sendBtn">Send</button>
            </div>
        </div>

    </div>

    <div class="controls">
        <button id="nextBtn">Next</button>
        <button id="reportBtn">Report</button>
        <button id="muteBtn">Mute</button>
    </div>
</div>
